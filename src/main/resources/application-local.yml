spring:
  datasource:
    url: jdbc:h2:mem:membership;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: membership-service
      auto-offset-reset: earliest

logging:
  level:
    com.baemin: DEBUG
    org.hibernate.SQL: DEBUG
